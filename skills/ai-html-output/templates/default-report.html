<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{TITLE} · AI Generated Report</title>
<style>
  :root {
    --bg: #FAF9F5;
    --bg-card: #FFFFFF;
    --bg-soft: #F4F1E8;
    --text: #3D3D3A;
    --text-muted: #87867F;
    --heading: #141413;
    --accent: #D97757;
    --accent-soft: #E9DDD0;
    --border: #D1CFC5;
    --border-strong: #B9B5AA;
    --code-bg: #F0EEE6;
    --shadow: 0 10px 30px rgba(20, 20, 19, 0.05);
    --radius: 16px;
    --radius-sm: 12px;
    
    --sans: "Noto Sans SC", "Source Han Sans SC", system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --mono: ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace;
    --green-bg: #E8F5EC;
    --green-text: #1A7F37;
    --yellow-bg: #FFF7D6;
    --yellow-text: #9A6700;
    --red-bg: #FDECEC;
    --red-text: #CF222E;
    --blue-bg: #EAF2FF;
    --blue-text: #2859C5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0D1117;
      --bg-card: #161B22;
      --bg-soft: #11161D;
      --text: #E6EDF3;
      --text-muted: #8B949E;
      --heading: #F0F6FC;
      --accent: #E89B6C;
      --accent-soft: #2A1E15;
      --border: #30363D;
      --border-strong: #484F58;
      --code-bg: #1C2128;
      --shadow: 0 14px 32px rgba(0, 0, 0, 0.28);
      --green-bg: rgba(46, 160, 67, 0.18);
      --green-text: #7EE787;
      --yellow-bg: rgba(187, 128, 9, 0.18);
      --yellow-text: #E3B341;
      --red-bg: rgba(248, 81, 73, 0.18);
      --red-text: #FF7B72;
      --blue-bg: rgba(56, 139, 253, 0.18);
      --blue-text: #79C0FF;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.7;
    padding: 32px 20px 72px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .page {
    max-width: 1080px;
    margin: 0 auto;
  }

  .report-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 24px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 12px 16px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: color-mix(in srgb, var(--bg-card) 86%, transparent);
    backdrop-filter: blur(10px);
    box-shadow: var(--shadow);
  }

  .topbar-left,
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-muted);
  }

  .report-tag {
    color: var(--accent);
    border-color: color-mix(in srgb, var(--accent) 30%, var(--border));
    background: var(--accent-soft);
  }

  .report-header {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: calc(var(--radius) + 4px);
    padding: 32px;
    box-shadow: var(--shadow);
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  h1 {
    font-family: var(--sans);
    font-weight: 700;
    font-size: clamp(30px, 4vw, 40px);
    line-height: 1.12;
    letter-spacing: -0.02em;
    color: var(--heading);
    margin-bottom: 12px;
  }

  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .lede {
    margin-top: 16px;
    max-width: 72ch;
    font-size: 17px;
    line-height: 1.75;
    color: var(--text);
  }

  .content-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 24px;
  }

  .toc {
    border: 1px solid var(--border);
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
  }

  .toc-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .toc ul {
    list-style: none;
    display: grid;
    gap: 8px;
    padding: 0;
    margin: 0;
  }

  .toc a {
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px solid transparent;
  }

  .toc a:hover { border-color: var(--accent); color: var(--accent); }

  .content {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: calc(var(--radius) + 4px);
    padding: 32px;
    box-shadow: var(--shadow);
  }

  .section-anchor { scroll-margin-top: 84px; }

  h2 {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 24px;
    line-height: 1.22;
    color: var(--heading);
    margin: 32px 0 12px;
    letter-spacing: -0.01em;
  }

  h2:first-child { margin-top: 0; }

  h3 {
    font-size: 16px;
    font-weight: 650;
    color: var(--heading);
    margin: 24px 0 8px;
  }

  h4 {
    font-size: 14px;
    font-weight: 700;
    color: var(--heading);
    margin: 16px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  p { margin-bottom: 16px; }
  ul, ol {
    margin: 0 0 16px 1.25rem;
    padding: 0;
  }
  li { margin: 8px 0; }
  strong { color: var(--heading); }
  a { color: var(--accent); }
  hr {
    border: 0;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }
  blockquote {
    margin: 16px 0;
    padding: 12px 16px;
    border-left: 3px solid var(--accent);
    background: var(--bg-soft);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--text);
  }

  .card,
  .panel,
  .summary-box,
  .callout,
  .metric-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  .card,
  .panel,
  .summary-box,
  .callout {
    padding: 16px 24px;
    margin: 16px 0;
  }

  .summary-box {
    background: linear-gradient(180deg, color-mix(in srgb, var(--accent-soft) 58%, var(--bg-card)), var(--bg-card));
  }

  .card-title,
  .panel-title,
  .summary-title,
  .callout-title {
    font-weight: 700;
    color: var(--heading);
    margin-bottom: 8px;
  }

  .callout {
    border-left: 4px solid var(--accent);
    background: color-mix(in srgb, var(--accent-soft) 60%, var(--bg-card));
  }
  .callout.note { border-left-color: var(--blue-text); }
  .callout.warning { border-left-color: var(--yellow-text); }
  .callout.danger { border-left-color: var(--red-text); }
  .callout.success { border-left-color: var(--green-text); }

  .grid {
    display: grid;
    gap: 16px;
    margin: 16px 0;
  }

  .two-col {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
    margin: 16px 0;
  }

  .metric-strip {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin: 16px 0 24px;
  }

  .metric-card {
    padding: 16px;
  }

  .metric-label {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .metric-value {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.1;
    color: var(--heading);
    margin-bottom: 4px;
  }

  .metric-note {
    font-size: 13px;
    color: var(--text-muted);
  }

  .checklist {
    list-style: none;
    margin-left: 0;
  }

  .checklist li {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    margin: 8px 0;
  }

  .checklist li::before {
    content: "✓";
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    margin-top: 2px;
    flex: 0 0 18px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 999px;
    border: 1px solid transparent;
    background: var(--accent-soft);
    color: var(--accent);
  }

  .tag.green { background: var(--green-bg); color: var(--green-text); }
  .tag.red { background: var(--red-bg); color: var(--red-text); }
  .tag.yellow { background: var(--yellow-bg); color: var(--yellow-text); }
  .tag.blue { background: var(--blue-bg); color: var(--blue-text); }

  .review-note,
  .diff-note {
    margin: 12px 0;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-soft);
  }

  .review-note-title,
  .diff-note-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    color: var(--heading);
    margin-bottom: 6px;
  }

  code {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--code-bg);
    padding: 2px 8px;
    border-radius: 4px;
  }

  pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    overflow-x: auto;
    margin: 16px 0;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
  }

  pre code {
    background: none;
    padding: 0;
    font-size: 12px;
    line-height: 1.65;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  th, td {
    text-align: left;
    vertical-align: top;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  th {
    font-weight: 700;
    color: var(--heading);
    background: var(--bg-soft);
  }

  tr:last-child td { border-bottom: none; }

  details {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin: 12px 0;
    padding: 12px 16px;
  }

  details summary {
    cursor: pointer;
    font-weight: 650;
    color: var(--heading);
  }

  details[open] { padding-bottom: 16px; }

  details .body {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .footer {
    margin-top: 24px;
    padding: 16px 4px 0;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  @media (min-width: 980px) {
    .content-grid {
      grid-template-columns: 220px minmax(0, 1fr);
      align-items: start;
    }

    .toc {
      position: sticky;
      top: 24px;
    }
  }

  @media (max-width: 820px) {
    body { padding: 24px 16px 56px; }
    .report-header,
    .content { padding: 24px 16px; }
    .topbar {
      border-radius: 16px;
      padding: 12px 16px;
    }
    .two-col,
    .metric-strip {
      grid-template-columns: 1fr;
    }
  }

  .mermaid {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin: 16px 0;
    box-shadow: var(--shadow);
    display: flex;
    justify-content: center;
    overflow-x: auto;
  }
  /* Mermaid enhancements toolbar theming */
  .mermaid-controls {
    background: var(--bg-card) !important;
    border: 1px solid var(--border) !important;
    border-radius: var(--radius-sm) !important;
    box-shadow: var(--shadow) !important;
  }
  .mermaid-control-btn {
    color: var(--text) !important;
  }
  .mermaid-control-btn:hover {
    background: var(--bg-soft) !important;
    color: var(--accent) !important;
  }
  .mermaid-lightbox {
    background: var(--bg) !important;
  }

  @media (max-width: 520px) {
    h1 { font-size: 28px; }
    h2 { font-size: 22px; }
    .meta-row { gap: 8px; }
  }

  @media (prefers-reduced-transparency: reduce) {
    .topbar {
      background: var(--bg-card);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
  }
</style>
<!-- Mermaid enhancements: zoom/pan, fullscreen lightbox, PNG/SVG export -->
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@mostlylucid/mermaid-enhancements@1.0.0/src/styles.css">
<script type="module">
  const mermaidModule = await import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs');
  const mermaid = mermaidModule.default;
  window.mermaid = mermaid;
  await mermaid.initialize({
    startOnLoad: true,
    theme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'default',
    securityLevel: 'loose',
  });
  await mermaid.run();
  const { enhanceMermaidDiagrams } = await import('https://unpkg.com/@mostlylucid/mermaid-enhancements@1.0.0/dist/index.bundle.min.js');
  await enhanceMermaidDiagrams();
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => location.reload());
</script>
</head>
<body>
<div class="page">
  <div class="report-shell">
    <div class="topbar">
      <div class="topbar-left">
        <span class="pill report-tag">{CATEGORY}</span>
        <span class="pill">HTML artifact</span>
      </div>
      <div class="topbar-right">
        <span class="pill">Open in browser</span>
      </div>
    </div>

    <header class="report-header">
      <div class="eyebrow">AI-generated artifact</div>
      <h1>{TITLE}</h1>
      <div class="meta-row">
        <span>{DATE}</span>
        <span>·</span>
        <span>AI-generated artifact</span>
      </div>
    </header>

    <div class="content-grid">
      <aside class="toc">
        <div class="toc-title">Suggested structure</div>
        <ul>
          <li><a href="#summary">Summary</a></li>
          <li><a href="#details">Details</a></li>
          <li><a href="#findings">Findings</a></li>
          <li><a href="#actions">Actions</a></li>
        </ul>
      </aside>

      <main class="content">
        {CONTENT}

        <div class="footer">
          <span>Generated by AI HTML Output</span>
          <span>Single-file · Mermaid-powered · Browser-friendly</span>
        </div>
      </main>
    </div>
  </div>
</div>
</body>
</html>
