<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{TITLE} · AI Generated Report</title>
<style>
  :root {
    --bg: #FAF9F5;
    --bg-card: #FFFFFF;
    --text: #3D3D3A;
    --text-muted: #87867F;
    --heading: #141413;
    --accent: #D97757;
    --accent-soft: #E3DACC;
    --border: #D1CFC5;
    --code-bg: #F0EEE6;
    --serif: Georgia, 'Times New Roman', serif;
    --sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --mono: ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0D1117;
      --bg-card: #161B22;
      --text: #E6EDF3;
      --text-muted: #8B949E;
      --heading: #F0F6FC;
      --accent: #58A6FF;
      --accent-soft: #1F2A37;
      --border: #30363D;
      --code-bg: #1C2128;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.65;
    padding: 40px 24px 80px;
    -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 800px; margin: 0 auto; }

  .report-header {
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 1.5px solid var(--border);
  }
  .report-tag {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  h1 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 28px;
    line-height: 1.25;
    color: var(--heading);
    margin-bottom: 8px;
  }
  .meta {
    font-size: 13px;
    color: var(--text-muted);
  }

  h2 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 20px;
    color: var(--heading);
    margin: 28px 0 10px;
  }
  h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--heading);
    margin: 20px 0 6px;
  }
  p { margin-bottom: 12px; }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
    margin: 14px 0;
  }
  .card-title { font-weight: 600; margin-bottom: 6px; color: var(--heading); }

  code {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
  }
  pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 12px 0;
  }
  pre code { background: none; padding: 0; }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 14px 0;
    font-size: 14px;
  }
  th, td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  th { font-weight: 600; color: var(--heading); }

  details {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 10px 0;
    padding: 10px 14px;
  }
  details summary { cursor: pointer; font-weight: 500; color: var(--heading); }
  details[open] { padding-bottom: 14px; }
  details .body { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--accent-soft);
    color: var(--accent);
  }
  .tag.green { background: #DAFBE7; color: #1A7F37; }
  .tag.red { background: #FFEBE9; color: #CF222E; }
  .tag.yellow { background: #FFF8C5; color: #9A6700; }

  @media (max-width: 600px) {
    body { padding: 24px 14px 60px; }
    h1 { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="report-header">
    <div class="report-tag">{CATEGORY}</div>
    <h1>{TITLE}</h1>
    <div class="meta">{DATE} · Generated by AI</div>
  </div>

  {CONTENT}

  <div style="margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted);">
    Generated by AI HTML Output · Open in browser for best experience
  </div>
</div>
</body>
</html>
